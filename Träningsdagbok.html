
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0F6E56;--teal-light:#E1F5EE;--teal-mid:#1D9E75;--gray:#888780;--gray-light:#F1EFE8;--border:0.5px solid var(--color-border-tertiary)}
body{font-family:'DM Sans',sans-serif;color:var(--color-text-primary)}
.app{padding:1.5rem 0}
.hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem}
.hdr h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400}
.hdr h1 em{font-style:italic;color:var(--teal)}
.tabs{display:flex;gap:3px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;margin-bottom:1.5rem}
.tab{flex:1;padding:7px 0;border:none;background:transparent;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.tab.active{background:var(--color-background-primary);color:var(--teal);border:var(--border)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.stat-label{font-size:11px;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:500}
.stat-val span{font-size:13px;font-weight:400;color:var(--color-text-secondary)}
.card{background:var(--color-background-primary);border:var(--border);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.form-row input,.form-row select,.form-row textarea{width:100%;border-radius:var(--border-radius-md);border:var(--border);padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary)}
.form-row textarea{resize:vertical;min-height:80px}
.pain-row{display:flex;gap:6px;flex-wrap:wrap}
.pain-btn{width:36px;height:36px;border-radius:50%;border:var(--border);background:var(--color-background-secondary);font-size:12px;font-weight:500;cursor:pointer;color:var(--color-text-primary)}
.pain-btn.sel{color:#fff;border-color:transparent}
.pain-btn[data-p="0"].sel,.pain-btn[data-p="1"].sel,.pain-btn[data-p="2"].sel,.pain-btn[data-p="3"].sel{background:#1D9E75}
.pain-btn[data-p="4"].sel,.pain-btn[data-p="5"].sel,.pain-btn[data-p="6"].sel{background:#BA7517}
.pain-btn[data-p="7"].sel,.pain-btn[data-p="8"].sel,.pain-btn[data-p="9"].sel,.pain-btn[data-p="10"].sel{background:#A32D2D}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.save-btn{width:100%;padding:11px;border-radius:var(--border-radius-md);border:none;background:var(--teal);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:.5rem}
.save-btn:hover{background:var(--teal-mid)}
.entry{border-bottom:var(--border);padding:14px 0}
.entry:last-child{border-bottom:none;padding-bottom:0}
.entry-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.entry-date{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.entry-title{font-size:15px;font-weight:500}
.entry-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.tag-type{background:var(--teal-light);color:var(--teal)}
.tag-dur{background:var(--gray-light);color:var(--gray)}
.pain-low{background:#EAF3DE;color:#3B6D11}
.pain-mid{background:#FAEEDA;color:#854F0B}
.pain-hi{background:#FCEBEB;color:#A32D2D}
.entry-note{font-size:13px;color:var(--color-text-secondary);margin-top:8px;line-height:1.5}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:18px;padding:2px 4px;flex-shrink:0;line-height:1}
.del-btn:hover{color:#A32D2D}
.empty{text-align:center;padding:3rem 1rem;color:var(--color-text-secondary)}
.empty p{font-size:14px;line-height:1.6}
.section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.exercises-input{display:flex;gap:8px}
.exercises-input input{flex:1}
.add-ex-btn{padding:9px 14px;border:var(--border);border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-size:13px;cursor:pointer;white-space:nowrap;color:var(--color-text-primary)}
.ex-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ex-tag{display:flex;align-items:center;gap:5px;background:var(--teal-light);color:var(--teal);font-size:12px;padding:4px 10px;border-radius:20px}
.ex-tag button{background:none;border:none;cursor:pointer;color:var(--teal);font-size:15px;padding:0;line-height:1}
.chart-wrap{position:relative;height:220px;margin-bottom:1.5rem}
.chart-section{margin-bottom:1.5rem}
.chart-label{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px}
.io-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.io-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;border:var(--border);border-radius:var(--border-radius-lg);background:var(--color-background-secondary);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--color-text-primary);transition:background .15s}
.io-btn:hover{background:var(--teal-light);color:var(--teal)}
.io-icon{font-size:26px}
.io-sub{font-size:11px;color:var(--color-text-secondary);font-weight:400;margin-top:2px}
.danger-zone{border:0.5px solid #F09595;border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-top:1rem}
.danger-title{font-size:12px;font-weight:500;color:#A32D2D;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.clear-btn{padding:9px 18px;border-radius:var(--border-radius-md);border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:var(--border-radius-md);font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
#file-import{display:none}
.import-drop{border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center;font-size:13px;color:var(--color-text-secondary);margin-top:1rem}
.import-drop label{cursor:pointer;color:var(--teal);font-weight:500}
.graph-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.gtype-btn{padding:8px;border:var(--border);border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-size:12px;font-weight:500;cursor:pointer;color:var(--color-text-secondary);font-family:'DM Sans',sans-serif}
.gtype-btn.active{background:var(--teal-light);color:var(--teal);border-color:var(--teal-mid)}
</style>

<h2 class="sr-only">Tränings- och rehabdagbok med grafer och export.</h2>

<div class="app">
  <div class="hdr">
    <h1>Tränings<em>dagbok</em></h1>
    <span style="font-size:12px;color:var(--color-text-secondary)" id="entry-count"></span>
  </div>
  <div class="stats-grid">
    <div class="stat"><div class="stat-label">Sessioner</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Denna vecka</div><div class="stat-val" id="s-week">0</div></div>
    <div class="stat"><div class="stat-label">Sn. smärta</div><div class="stat-val" id="s-pain">— <span>/10</span></div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('log')">Logga</button>
    <button class="tab" onclick="showTab('history')">Historik</button>
    <button class="tab" onclick="showTab('graphs')">Grafer</button>
    <button class="tab" onclick="showTab('io')">Export / Import</button>
  </div>

  <div id="tab-log">
    <div class="card">
      <div class="form-grid">
        <div class="form-row"><label>Datum</label><input type="date" id="f-date"></div>
        <div class="form-row"><label>Tid (min)</label><input type="number" id="f-dur" placeholder="45" min="1" max="600"></div>
      </div>
      <div class="form-row"><label>Typ av session</label>
        <select id="f-type">
          <option value="">Välj typ…</option>
          <option>Styrketräning</option><option>Kondition</option><option>Rehab / fysioterapi</option>
          <option>Rörlighet / stretching</option><option>Yoga / pilates</option><option>Simning</option>
          <option>Cykling</option><option>Löpning</option><option>Promenad</option><option>Övrigt</option>
        </select>
      </div>
      <div class="form-row"><label>Smärtnivå (0 = ingen smärta)</label><div class="pain-row" id="pain-btns"></div></div>
      <div class="form-row">
        <label>Övningar</label>
        <div class="exercises-input">
          <input type="text" id="f-ex-input" placeholder="t.ex. knäböj, benspark…" onkeydown="if(event.key==='Enter'){addExercise();event.preventDefault()}">
          <button class="add-ex-btn" onclick="addExercise()">+ Lägg till</button>
        </div>
        <div class="ex-list" id="ex-list"></div>
      </div>
      <div class="form-row"><label>Anteckningar</label><textarea id="f-notes" placeholder="Hur kändes det? Framsteg, reaktioner…"></textarea></div>
      <button class="save-btn" onclick="saveEntry()">Spara session</button>
    </div>
  </div>

  <div id="tab-history" style="display:none"><div id="history-list"></div></div>

  <div id="tab-graphs" style="display:none">
    <div class="graph-type-grid">
      <button class="gtype-btn active" onclick="setGraph('weeks')">Sessioner/vecka</button>
      <button class="gtype-btn" onclick="setGraph('pain')">Smärta över tid</button>
      <button class="gtype-btn" onclick="setGraph('types')">Sessionstyper</button>
    </div>
    <div class="card">
      <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
    </div>
    <div id="graph-insight" style="font-size:13px;color:var(--color-text-secondary);line-height:1.6;padding:0 .25rem"></div>
  </div>

  <div id="tab-io" style="display:none">
    <div class="card">
      <div class="section-title">Exportera data</div>
      <div class="io-grid">
        <button class="io-btn" onclick="exportJSON()">
          <span class="io-icon">📄</span>
          <span>Exportera JSON</span>
          <span class="io-sub">Fullständig backup</span>
        </button>
        <button class="io-btn" onclick="exportCSV()">
          <span class="io-icon">📊</span>
          <span>Exportera CSV</span>
          <span class="io-sub">Öppna i Excel</span>
        </button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Importera data</div>
      <div class="import-drop">
        <input type="file" id="file-import" accept=".json" onchange="importJSON(event)">
        <div>Dra och släpp en JSON-fil hit, eller</div>
        <label for="file-import"> välj fil från din enhet</label>
        <div style="margin-top:8px;font-size:11px">Importerar data från en tidigare exporterad backup.</div>
      </div>
    </div>
    <div class="danger-zone">
      <div class="danger-title">Farlig zon</div>
      <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px">Detta tar bort all loggad data permanent.</p>
      <button class="clear-btn" onclick="clearAll()">Rensa all data</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const STORAGE_KEY='rehab-diary-v2';
let entries=[];
let exercises=[];
let selectedPain=null;
let currentGraph='weeks';
let chartInstance=null;

const painBtnsEl=document.getElementById('pain-btns');
for(let i=0;i<=10;i++){
  const b=document.createElement('button');
  b.className='pain-btn';b.textContent=i;b.dataset.p=i;
  b.onclick=()=>selectPain(i);
  painBtnsEl.appendChild(b);
}

function selectPain(n){
  selectedPain=n;
  document.querySelectorAll('.pain-btn').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.p)===n));
}
function addExercise(){
  const inp=document.getElementById('f-ex-input');
  const v=inp.value.trim();if(!v)return;
  exercises.push(v);renderExList();inp.value='';inp.focus();
}
function removeEx(i){exercises.splice(i,1);renderExList();}
function renderExList(){
  document.getElementById('ex-list').innerHTML=exercises.map((e,i)=>`<span class="ex-tag">${e}<button onclick="removeEx(${i})">×</button></span>`).join('');
}

async function loadEntries(){
  try{const r=await window.storage.get(STORAGE_KEY);if(r&&r.value)entries=JSON.parse(r.value);}catch(e){entries=[];}
  refresh();
}
async function persist(){
  try{await window.storage.set(STORAGE_KEY,JSON.stringify(entries));}catch(e){}
}

async function saveEntry(){
  const date=document.getElementById('f-date').value;
  const dur=document.getElementById('f-dur').value;
  const type=document.getElementById('f-type').value;
  const notes=document.getElementById('f-notes').value.trim();
  if(!date){showToast('Välj ett datum');return;}
  if(!type){showToast('Välj typ av session');return;}
  entries.unshift({id:Date.now(),date,duration:dur?parseInt(dur):null,type,pain:selectedPain,exercises:[...exercises],notes});
  await persist();showToast('Session sparad!');resetForm();refresh();
}
function resetForm(){
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('f-dur').value='';
  document.getElementById('f-type').value='';
  document.getElementById('f-notes').value='';
  exercises=[];selectedPain=null;
  document.querySelectorAll('.pain-btn').forEach(b=>b.classList.remove('sel'));
  renderExList();
}
async function deleteEntry(id){
  entries=entries.filter(e=>e.id!==id);
  await persist();refresh();showToast('Borttagen');
}

function refresh(){
  updateStats();renderHistory();
  document.getElementById('entry-count').textContent=entries.length?`${entries.length} session${entries.length===1?'':'er'}`:'';
  if(document.getElementById('tab-graphs').style.display!=='none') renderGraph(currentGraph);
}

function updateStats(){
  document.getElementById('s-total').textContent=entries.length;
  const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
  document.getElementById('s-week').textContent=entries.filter(e=>new Date(e.date)>=weekAgo).length;
  const wp=entries.filter(e=>e.pain!=null);
  document.getElementById('s-pain').innerHTML=wp.length?`${(wp.reduce((s,e)=>s+e.pain,0)/wp.length).toFixed(1)} <span>/10</span>`:`— <span>/10</span>`;
}

function painClass(p){return p<=3?'pain-low':p<=6?'pain-mid':'pain-hi';}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!entries.length){el.innerHTML=`<div class="empty"><p>Inga sessioner loggade ännu.</p></div>`;return;}
  const grouped={};
  entries.forEach(e=>{const mo=e.date.slice(0,7);if(!grouped[mo])grouped[mo]=[];grouped[mo].push(e);});
  const months=['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  let html='';
  Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(mo=>{
    const [y,m]=mo.split('-');
    html+=`<div class="section-title">${months[parseInt(m)-1]} ${y}</div><div class="card">`;
    grouped[mo].forEach(e=>{
      const d=new Date(e.date);
      const dn=['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
      html+=`<div class="entry">
        <div class="entry-top">
          <div><div class="entry-date">${dn[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}</div><div class="entry-title">${e.type}</div></div>
          <button class="del-btn" onclick="deleteEntry(${e.id})">×</button>
        </div>
        <div class="entry-tags">
          ${e.duration?`<span class="tag tag-dur">${e.duration} min</span>`:''}
          ${e.pain!=null?`<span class="tag ${painClass(e.pain)}">Smärta ${e.pain}/10</span>`:''}
          ${(e.exercises||[]).map(x=>`<span class="tag tag-type">${x}</span>`).join('')}
        </div>
        ${e.notes?`<div class="entry-note">${e.notes}</div>`:''}
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function setGraph(t){
  currentGraph=t;
  document.querySelectorAll('.gtype-btn').forEach((b,i)=>b.classList.toggle('active',['weeks','pain','types'][i]===t));
  renderGraph(t);
}

function renderGraph(t){
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  const ctx=document.getElementById('main-chart');
  const isDark=document.documentElement.classList.contains('dark')||window.matchMedia('(prefers-color-scheme:dark)').matches;
  const textColor=isDark?'rgba(255,255,255,0.55)':'rgba(0,0,0,0.45)';
  const gridColor=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const insight=document.getElementById('graph-insight');

  if(t==='weeks'){
    const weeks=[];
    for(let i=11;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i*7);
      const start=new Date(d);start.setDate(d.getDate()-d.getDay());
      const end=new Date(start);end.setDate(start.getDate()+6);
      const label=`v.${getWeekNumber(start)}`;
      const count=entries.filter(e=>{const ed=new Date(e.date);return ed>=start&&ed<=end;}).length;
      weeks.push({label,count});
    }
    const total=weeks.reduce((s,w)=>s+w.count,0);
    const avg=(total/12).toFixed(1);
    const best=Math.max(...weeks.map(w=>w.count));
    insight.textContent=`Senaste 12 veckorna: ${total} sessioner totalt, i snitt ${avg} per vecka. Bästa vecka: ${best} session${best===1?'':'er'}.`;
    chartInstance=new Chart(ctx,{
      type:'bar',
      data:{labels:weeks.map(w=>w.label),datasets:[{data:weeks.map(w=>w.count),backgroundColor:'rgba(15,110,86,0.75)',borderRadius:6,hoverBackgroundColor:'rgba(29,158,117,0.9)'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:textColor,font:{size:11}},grid:{display:false}},y:{ticks:{color:textColor,font:{size:11},stepSize:1},grid:{color:gridColor},beginAtZero:true}}}
    });
  } else if(t==='pain'){
    const withPain=entries.filter(e=>e.pain!=null).slice(0,30).reverse();
    if(withPain.length<2){insight.textContent='Logga minst 2 sessioner med smärtnivå för att se trenden.';return;}
    const labels=withPain.map(e=>{const d=new Date(e.date);return `${d.getDate()}/${d.getMonth()+1}`;});
    const vals=withPain.map(e=>e.pain);
    const avg=(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);
    const trend=vals[vals.length-1]-vals[0];
    const trendStr=Math.abs(trend)<0.5?'stabil':trend<0?'minskande (positivt!)':'ökande';
    insight.textContent=`Genomsnittlig smärtnivå: ${avg}/10. Trend de senaste sessionerna: ${trendStr}.`;
    chartInstance=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{data:vals,borderColor:'rgba(186,117,23,0.9)',backgroundColor:'rgba(250,238,218,0.3)',tension:0.3,fill:true,pointBackgroundColor:'rgba(186,117,23,1)',pointRadius:4,pointHoverRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:textColor,font:{size:11}},grid:{display:false}},y:{min:0,max:10,ticks:{color:textColor,font:{size:11},stepSize:2},grid:{color:gridColor}}}}
    });
  } else {
    const counts={};
    entries.forEach(e=>{counts[e.type]=(counts[e.type]||0)+1;});
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length){insight.textContent='Inga sessioner ännu.';return;}
    const colors=['rgba(15,110,86,0.8)','rgba(29,158,117,0.7)','rgba(186,117,23,0.75)','rgba(163,45,45,0.7)','rgba(83,74,183,0.7)','rgba(212,83,126,0.7)','rgba(136,135,128,0.65)','rgba(55,138,221,0.7)','rgba(99,153,34,0.7)'];
    const top=sorted[0];
    insight.textContent=`${sorted.length} olika sessionstyper. Vanligast: "${top[0]}" (${top[1]} gånger, ${Math.round(top[1]/entries.length*100)}% av alla sessioner).`;
    chartInstance=new Chart(ctx,{
      type:'doughnut',
      data:{labels:sorted.map(s=>s[0]),datasets:[{data:sorted.map(s=>s[1]),backgroundColor:colors,borderWidth:0,hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:textColor,font:{size:11},boxWidth:12,padding:12}}}}
    });
  }
}

function getWeekNumber(d){const onejan=new Date(d.getFullYear(),0,1);return Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);}

function exportJSON(){
  if(!entries.length){showToast('Inga sessioner att exportera');return;}
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),entries},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`rehabdagbok_${new Date().toISOString().slice(0,10)}.json`;a.click();
  showToast('JSON exporterad!');
}

function exportCSV(){
  if(!entries.length){showToast('Inga sessioner att exportera');return;}
  const rows=[['Datum','Typ','Tid (min)','Smärtnivå','Övningar','Anteckningar']];
  entries.forEach(e=>rows.push([e.date,e.type,e.duration??'',e.pain??'',(e.exercises||[]).join('; '),e.notes||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`rehabdagbok_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  showToast('CSV exporterad!');
}

function importJSON(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const imported=data.entries||data;
      if(!Array.isArray(imported))throw new Error();
      const merged=[...entries];
      const existingIds=new Set(entries.map(e=>e.id));
      let added=0;
      imported.forEach(e=>{if(!existingIds.has(e.id)){merged.push(e);added++;}});
      entries=merged.sort((a,b)=>b.date.localeCompare(a.date));
      await persist();refresh();
      showToast(`Importerade ${added} nya sessioner`);
    }catch(e){showToast('Ogiltig fil – kontrollera formatet');}
    evt.target.value='';
  };
  reader.readAsText(file);
}

async function clearAll(){
  if(!confirm('Är du säker? All data tas bort permanent.'))return;
  entries=[];await persist();refresh();showToast('All data rensad');
}

function showTab(t){
  ['log','history','graphs','io'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['log','history','graphs','io'][i]===t));
  if(t==='graphs')renderGraph(currentGraph);
}

function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
loadEntries();
</script>
