const APP_VERSION_MANUAL = '';

const versionStamp = (d=new Date()) => {
  const mons = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  const mon = mons[d.getMonth()];
  const yy = String(d.getFullYear()).slice(-2);
  return `${mon}-${yy}`;
};

const APP_VERSION = APP_VERSION_MANUAL || versionStamp();
const APP_BUILD_DATE = new Date().toISOString().slice(0,10);

const fmtDateTime = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('sv-SE', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
};

/* ── DIAGRAM ── */
function BarChart({ data, height = 120 }) {
  const max = Math.max(...data.map(d => Math.max(d.income, d.expense)), 1);

  return (
    <svg width="100%" height={height}>
      {data.map((d, i) => {
        const barW = 16;
        const gap = 14;
        const x = i * (barW * 2 + gap) + 10;

        return (
          <g key={i}>
            <rect
              x={x}
              y={height - (d.income / max) * height}
              width={barW}
              height={(d.income / max) * height}
              fill={C.green}
              rx="3"
            />
            <rect
              x={x + barW + 4}
              y={height - (d.expense / max) * height}
              width={barW}
              height={(d.expense / max) * height}
              fill={C.red}
              rx="3"
            />
          </g>
        );
      })}
    </svg>
  );
}

function Card({ children, style, onClick }) {

function Btn({ children, onClick, variant='primary', sm, disabled, style }) {

    ghost:{background:'transparent',color:C.sub,border:`1px solid ${C.border}`},
    danger:{background:C.redFade,color:C.red,border:'1px solid rgba(240,112,112,0.3)'},

    green:{background:C.greenFade,color:C.green,border:'1px solid rgba(63,214,143,0.3)'},
  };

  return (

      disabled={disabled}
      style={{
        padding: sm ? '5px 12px' : '9px 18px',
        borderRadius:9,
        fontSize: sm ? 12 : 14,
        fontWeight:700,
        cursor:disabled?'not-allowed':'pointer',
        opacity:disabled?0.45:1,
        ...VS[variant],
        ...style

    >
      {children}
    </button>
  );
}

function Lbl({ text }) {

}

function Sel({ label, value, onChange, options }) {

/* ── LOGIN ── */
function LoginScreen({ onUnlock }) {
  const [pin,setPin] = useState('');
  const [conf,setConf] = useState('');
  const hasPin = !!db.get('pin');
  const [err,setErr] = useState('');

  const go = () => {
    if (hasPin) {
      if (pin === db.get('pin')) onUnlock();
      else { setErr('Fel PIN'); setPin(''); }
    } else {
      if (pin.length < 4) return setErr('Minst 4 tecken');
      if (pin !== conf) return setErr('PIN matchar inte');
      db.set('pin',pin);
      onUnlock();
    }
  };

  return (
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <Card style={{width:340,textAlign:'center'}}>
        <h1 style={{color:C.accent, marginBottom:4}}>
  {APP_NAME}
</h1>
<div style={{fontSize:12, color:C.sub, marginBottom:14}}>
  Version {APP_VERSION}
</div>
        <Inp label="PIN" type="password" value={pin} onChange={setPin} autoFocus/>
        {!hasPin && <Inp label="Bekräfta PIN" type="password" value={conf} onChange={setConf}/>}
        {err && <div style={{color:C.red,fontSize:12}}>{err}</div>}
        <Btn onClick={go} style={{width:'100%'}}>{hasPin?'Logga in':'Skapa konto'}</Btn>
      </Card>
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({ txns, loans, goals, lastUpdated, onOpenChangelog }) {
  const cur = moKey();
  const moTxns = txns.filter(t => t.date?.startsWith(cur));

  const income = moTxns.filter(t => t.type === 'income').reduce((s,t)=>s+t.amount,0);
  const expenses = moTxns.filter(t => t.type === 'expense').reduce((s,t)=>s+t.amount,0);

  const totalDebt = loans.reduce((s,l)=>s+(l.balance||0),0);
  const totalSaved = goals.reduce((s,g)=>s+(g.current||0),0);

  const recent = [...txns].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8);

  const catSpend = {};
  moTxns.filter(t=>t.type==='expense').forEach(t=>{
    catSpend[t.catId]=(catSpend[t.catId]||0)+t.amount;
  });
  const top = Object.entries(catSpend).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxS = top.length ? top[0][1] : 1;

  // ── Diagramdata: senaste 6 månader ──
  const months = [...new Set(txns.map(t => t.date?.slice(0,7)).filter(Boolean))]
    .sort()
    .slice(-6);

  const chartData = months.map(m => {
    const mTx = txns.filter(t => t.date?.startsWith(m));
    return {
      income: mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      expense: mTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),
    };
  });

  function KPI({ icon, label, value, color, sub }) {
    return (
      <Card style={{display:'flex',gap:14,alignItems:'center'}}>
        <div style={{
          width:46,height:46,borderRadius:12,background:color+'1f',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:21,flexShrink:0
        }}>
          {icon}
        </div>
        <div>
          <div style={{
            fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',
            letterSpacing:'0.07em',marginBottom:2
          }}>
            {label}
          </div>
          <div style={{fontSize:17,fontWeight:900,color}}>{value}</div>
          {sub && <div style={{fontSize:10,color:C.sub,marginTop:1}}>{sub}</div>}
        </div>
      </Card>
    );
  }

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h2 style={{margin:0,color:C.text,fontSize:22,fontWeight:900}}>Ekonomisk översikt</h2>
        <div style={{color:C.sub,fontSize:13,marginTop:3}}>{moLbl(cur)}</div>
      
<Card style={{ marginBottom: 16, background: C.surf2 }}>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
    <div>
      <div style={{fontSize:16,fontWeight:900,color:C.text}}>{APP_NAME}</div>
      <div style={{fontSize:12,color:C.sub,marginTop:4}}>
        Version <strong style={{color:C.text}}>{APP_VERSION}</strong> · Build <strong style={{color:C.text}}>{APP_BUILD_DATE}</strong>
      </div>
      <div style={{fontSize:12,color:C.sub,marginTop:4}}>
        Senast uppdaterad: <strong style={{color:C.text}}>{fmtDateTime(lastUpdated)}</strong>
      </div>
    </div>

    <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
      <Btn variant="ghost" sm onClick={onOpenChangelog}>📌 Changelog</Btn>
    </div>
  </div>
</Card>
</div>

      <div style={{
        display:'grid',
        gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',
        gap:12,
        marginBottom:24
      }}>
        <KPI icon="📈" label="Inkomster" value={kr(income)} color={C.green}/>
        <KPI icon="📉" label="Utgifter" value={kr(expenses)} color={C.red}/>
        <KPI icon="⚖️" label="Resultat" value={kr(income-expenses)}
             color={income>=expenses?C.green:C.red}
             sub={income>=expenses?'✓ Positivt':'⚠ Underskott'}/>
        <KPI icon="🏦" label="Total skuld" value={kr(totalDebt)} color={C.blue}/>
        <KPI icon="🎯" label="Totalt sparat" value={kr(totalSaved)} color={C.purple}/>
      </div>

      {/* 📊 Diagram helbredd */}
      <Card style={{marginBottom:24}}>
        <div style={{
          fontWeight:800,fontSize:11,color:C.sub,letterSpacing:'0.09em',
          textTransform:'uppercase',marginBottom:12
        }}>
          📊 Inkomst vs utgift – senaste månaderna

/* ── KASSABOK ── */
function Kassabok({ txns, onSave }) {
  const [showAdd,setShowAdd] = useState(false);
  const [moF,setMoF] = useState(moKey());
  const [catF,setCatF] = useState('');

  const sorted = [...txns].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const balMap = {}; let run=0;
  sorted.forEach(t=>{ run += (t.type==='income'?t.amount:-t.amount); balMap[t.id]=run; });

  let filtered = sorted;
  if(moF) filtered = filtered.filter(t=>t.date?.startsWith(moF));
  if(catF) filtered = filtered.filter(t=>t.catId===catF);
  const display = [...filtered].reverse();

  const income = filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expenses = filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const months = [...new Set(txns.map(t=>t.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  if(!months.includes(moKey())) months.unshift(moKey());

  const SS = {
    padding:'8px 12px',background:C.surf2,border:`1px solid ${C.border}`,
    borderRadius:8,color:C.text,fontSize:13,outline:'none'
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <h2 style={{margin:0,color:C.text,fontSize:22,fontWeight:900}}>📒 Kassabok</h2>
        <Btn onClick={()=>setShowAdd(true)}>+ Ny transaktion</Btn>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:18}}>
        {[
          ['Inkomster',income,C.green],
          ['Utgifter',expenses,C.red],
          ['Resultat',income-expenses, income>=expenses?C.green:C.red]
        ].map(([l,v,color])=>(
          <Card key={l} style={{textAlign:'center',padding:14}}>
            <div style={{fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>
              {l}
            </div>
            <div style={{fontSize:18,fontWeight:900,color}}>{kr(v)}</div>
          </Card>
        ))}
      </div>

      <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
        <select value={moF} onChange={e=>setMoF(e.target.value)} style={SS}>
          <option value="">Alla månader</option>
          {months.map(m=><option key={m} value={m}>{moLbl(m)}</option>)}
        </select>

        <select value={catF} onChange={e=>setCatF(e.target.value)} style={SS}>
          <option value="">Alla kategorier</option>
          {ALL_CATS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
        </select>

        <div style={{marginLeft:'auto',fontSize:11,color:C.sub}}>{display.length} poster</div>
      </div>

      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:640}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${C.border}`}}>
                {['Datum','Beskrivning','Kategori','Inbetalning','Utbetalning','Saldo',''].map((h,i)=>(
                  <th key={i} style={{
                    padding:'11px 14px',
                    textAlign:i>2?'right':'left',
                    color:C.sub,fontSize:10,fontWeight:700,
                    textTransform:'uppercase',letterSpacing:'0.07em',whiteSpace:'nowrap'
                  }}>
                    {h}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {display.length===0 ? (
                <tr><td colSpan={7} style={{padding:48,textAlign:'center',color:C.sub}}>
                  Inga transaktioner – lägg till din första!
                </td></tr>
              ) : display.map(t=>{
                const cat = findCat(t.catId);
                const bal = balMap[t.id];
                return (
                  <tr key={t.id} style={{borderBottom:`1px solid ${C.faint}`}}>
                    <td style={{padding:'9px 14px',color:C.sub,whiteSpace:'nowrap'}}>{datS(t.date)}</td>
                    <td style={{padding:'9px 14px',maxWidth:190}}>
                      <div style={{color:C.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {t.desc || cat.label}
                      </div>
                      {t.notes && <div style={{color:C.sub,fontSize:10,marginTop:1}}>{t.notes}</div>}
                    </td>
                    <td style={{padding:'9px 14px',whiteSpace:'nowrap'}}>
                      <span style={{fontSize:14}}>{cat.icon}</span>
                      <span style={{color:C.sub,fontSize:11,marginLeft:5}}>{cat.label}</span>
                    </td>
                    <td style={{padding:'9px 14px',textAlign:'right',color:C.green,fontWeight:700}}>
                      {t.type==='income'?kr(t.amount):''}
                    </td>
                    <td style={{padding:'9px 14px',textAlign:'right',color:C.red,fontWeight:700}}>
                      {t.type==='expense'?kr(t.amount):''}
                    </td>
                    <td style={{padding:'9px 14px',textAlign:'right',fontWeight:800,color:bal>=0?C.text:C.red}}>
                      {kr(bal)}

        <TxnModal
          onAdd={t => onSave([...txns, t])}

        />
      )}

  );
}

/* ── BUDGET ── */
function Budget({ txns, budgets, onSaveBudgets }) {
  const [selMo,setSelMo] = useState(moKey());
  const [editing,setEditing] = useState(false);
  const [draft,setDraft] = useState({});

  const months = [...new Set(txns.map(t=>t.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  if(!months.includes(moKey())) months.unshift(moKey());

  const actual = {};
  txns.filter(t=>t.date?.startsWith(selMo) && t.type==='expense')
      .forEach(t=>{ actual[t.catId]=(actual[t.catId]||0)+t.amount; });

  const actIncome = txns.filter(t=>t.date?.startsWith(selMo) && t.type==='income')
      .reduce((s,t)=>s+t.amount,0);

  const moList = [...new Set(txns.map(t=>t.date?.slice(0,7)).filter(Boolean))].sort().reverse().slice(0,6);
  const avgMap = {};
  if(moList.length){
    txns.filter(t=>moList.includes(t.date?.slice(0,7)) && t.type==='expense')
      .forEach(t=>{ avgMap[t.catId]=(avgMap[t.catId]||0)+t.amount; });
    Object.keys(avgMap).forEach(k=>{ avgMap[k]=avgMap[k]/moList.length; });
  }

  const moBgt = budgets[selMo] || {};
  const totAct = Object.values(actual).reduce((s,v)=>s+v,0);
  const totBgt = Object.values(editing?draft:moBgt).reduce((s,v)=>s+v,0);

  const SS = {
    padding:'8px 12px',background:C.surf2,border:`1px solid ${C.border}`,
    borderRadius:8,color:C.text,fontSize:13,outline:'none'
  };

  const SECTIONS = [
    {label:'💼 Fasta kostnader',cats:CATS.fixed,color:C.blue},
    {label:'🛒 Rörliga kostnader',cats:CATS.variable,color:C.accent},
    {label:'🎯 Sparande',cats:CATS.savings,color:C.purple},
  ];

  function BgtRow({ cat, color }) {
    const act = actual[cat.id] || 0;
    const bgt = editing ? (draft[cat.id]||0) : (moBgt[cat.id]||0);
    const diff = bgt - act;
    if(!act && !bgt && !editing) return null;

    return (
      <div style={{
        display:'grid',
        gridTemplateColumns:'210px 1fr 110px 120px 100px',
        gap:10,alignItems:'center',
        padding:'8px 0',
        borderBottom:`1px solid ${C.faint}`
      }}>
        <div style={{display:'flex',alignItems:'center',gap:7,minWidth:0}}>
          <span style={{fontSize:15,flexShrink:0}}>{cat.icon}</span>
          <span style={{color:C.text,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat.label}</span>
        </div>

        <div>
          {bgt>0 && (
            <div style={{background:C.surf2,borderRadius:4,height:6,overflow:'hidden'}}>
              <div style={{
                width:`${Math.min(100,(act/bgt)*100)}%`,
                height:'100%',
                background:color,
                borderRadius:4
              }}/>
            </div>
          )}
        </div>

        <div style={{textAlign:'right',color:act>0?C.text:C.sub,fontSize:12}}>
          {act>0 ? kr(act) : '–'}
        </div>

        <div style={{textAlign:'right'}}>
          {editing ? (
            <input
              type="number"
              value={draft[cat.id] ?? ''}
              onChange={e=>setDraft(p=>({...p,[cat.id]:parseFloat(e.target.value)||0}))}
              placeholder="0"
              style={{...INP,padding:'5px 8px',width:'110px',textAlign:'right',fontSize:12}}
            />
          ) : (
            <span style={{color:bgt>0?C.text:C.sub,fontSize:12,fontWeight:700}}>
              {bgt>0 ? kr(bgt) : '–'}
            </span>
          )}
        </div>

        <div style={{textAlign:'right',fontSize:12,fontWeight:700,color:bgt===0?C.sub:(diff>=0?C.green:C.red)}}>
          {bgt>0 ? (diff>=0 ? `+${kr(diff)}` : kr(diff)) : '–'}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22,flexWrap:'wrap',gap:10}}>
        <h2 style={{margin:0,color:C.text,fontSize:22,fontWeight:900}}>💰 Budget</h2>

        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <select value={selMo} onChange={e=>{setSelMo(e.target.value);setEditing(false);}} style={SS}>
            {months.map(m=><option key={m} value={m}>{moLbl(m)}</option>)}
          </select>

          {!editing ? (
            <Btn variant="blue" sm onClick={()=>{setDraft({...moBgt});setEditing(true);}}>✏️ Redigera budget</Btn>
          ) : (
            <>
              <Btn variant="ghost" sm onClick={()=>{
                const d={...draft};
                Object.keys(avgMap).forEach(k=>{ if(!d[k]) d[k]=Math.round(avgMap[k]); });
                setDraft(d);
              }}>📊 Fyll från snitt</Btn>

              <Btn variant="ghost" sm onClick={()=>setEditing(false)}>Avbryt</Btn>
              <Btn sm onClick={()=>{onSaveBudgets({...budgets,[selMo]:draft});setEditing(false);}}>💾 Spara</Btn>
            </>
          )}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:22}}>
        {[
          ['Inkomst (utfall)',actIncome,C.green],
          ['Totalt budgeterat',totBgt,C.accent],
          ['Totalt utfall',totAct,C.red],
          ['Kvar av budget',totBgt-totAct,totBgt>=totAct?C.green:C.red]
        ].map(([l,v,color])=>(
          <Card key={l} style={{textAlign:'center',padding:14}}>
            <div style={{fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>{l}</div>
            <div style={{fontSize:17,fontWeight:900,color}}>{kr(v)}</div>
          </Card>
        ))}
      </div>

      <div style={{
        display:'grid',
        gridTemplateColumns:'210px 1fr 110px 120px 100px',
        gap:10,
        padding:'6px 0 8px',
        borderBottom:`1px solid ${C.border}`
      }}>
        {['Kategori','Förbrukning','Utfall','Budget','Diff'].map((h,i)=>(
          <div key={h} style={{textAlign:i>1?'right':'left',fontSize:10,fontWeight:700,color:C.sub,textTransform:'uppercase',letterSpacing:'0.07em'}}>
            {h}
          </div>
        ))}
      </div>

      {SECTIONS.map(sec=>{
        const hasAny = sec.cats.some(c=> (actual[c.id]||0)>0 || (moBgt[c.id]||0)>0 );
        if(!hasAny && !editing) return null;

        return (
          <div key={sec.label} style={{marginTop:18}}>
            <div style={{
              fontSize:11,fontWeight:800,color:C.accent,textTransform:'uppercase',
              letterSpacing:'0.1em',marginBottom:6,paddingBottom:4,
              borderBottom:`1px solid ${C.accentFade}`
            }}>
              {sec.label}
            </div>
            {sec.cats.map(c=><BgtRow key={c.id} cat={c} color={sec.color}/>)}
          </div>
        );
      })}

      {!editing && totAct===0 && totBgt===0 && (
        <div style={{textAlign:'center',padding:'52px 0',color:C.sub}}>
          <div style={{fontSize:40,marginBottom:14}}>💰</div>
          <div style={{fontSize:15,marginBottom:8}}>Ingen budgetdata för {moLbl(selMo)}</div>
          <div style={{fontSize:13,marginBottom:20}}>Registrera transaktioner i kassaboken – budgetbilden byggs automatiskt.</div>
          <Btn onClick={()=>{setDraft({...moBgt});setEditing(true);}}>✏️ Sätt upp budget manuellt</Btn>
        </div>
      )}

      {moList.length>0 && Object.keys(avgMap).length>0 && (
        <Card style={{marginTop:24,background:C.surf2,border:`1px solid ${C.faint}`}}>
          <div style={{fontWeight:800,fontSize:11,color:C.sub,letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:14}}>
            📈 Snittkostnad senaste {moList.length} mån – underlag för nästa år
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {Object.entries(avgMap).sort((a,b)=>b[1]-a[1]).map(([cid,a])=>{
              const cat=findCat(cid);
              return (
                <div key={cid} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:9,padding:'6px 12px',fontSize:12}}>
                  {cat.icon} {cat.label}: <strong style={{color:C.accent}}>{kr(a)}/mån</strong>
                  <span style={{color:C.sub,fontSize:11}}> · {kr(a*12)}/år</span>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

/* ── LÅN ── */
function AddLoanModal({ onAdd, onClose }) {
  const [f,setF] = useState({ name:'', origAmount:'', balance:'', rate:'', startDate:toDay() });
  const set = (k,v)=>setF(p=>({...p,[k]:v}));

  const handle = () => {
    const orig = parseFloat(f.origAmount);
    if(!f.name || isNaN(orig) || orig<=0) return;
    const bal = parseFloat(f.balance);
    onAdd({
      id:uid(),
      name:f.name,
      origAmount:orig,
      balance:isNaN(bal)?orig:bal,
      rate:parseFloat(f.rate)||0,
      startDate:f.startDate,
      payments:[]
    });
    onClose();
  };

  return (
    <Modal title="🏦 Registrera lån" onClose={onClose}>
      <Inp label="Lånets namn" value={f.name} onChange={v=>set('name',v)} placeholder="t.ex. Bolån, Billån..." autoFocus/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
        <Inp label="Ursprungligt belopp (kr)" type="number" value={f.origAmount} onChange={v=>set('origAmount',v)} placeholder="0"/>
        <Inp label="Nuvarande saldo (kr)" type="number" value={f.balance} onChange={v=>set('balance',v)} placeholder="Lämna tomt = nytt lån"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
        <Inp label="Nominell ränta (%/år)" type="number" value={f.rate} onChange={v=>set('rate',v)} placeholder="t.ex. 4.5"/>
        <Inp label="Startdatum" type="date" value={f.startDate} onChange={v=>set('startDate',v)}/>
      </div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <Btn variant="ghost" onClick={onClose}>Avbryt</Btn>
        <Btn onClick={handle} disabled={!f.name || !f.origAmount}>Lägg till lån</Btn>
      </div>
    </Modal>
  );
}

function PayModal({ loan, onAdd, onClose }) {
  const [f,setF] = useState({ month:moKey(), payment:'' });
  const set = (k,v)=>setF(p=>({...p,[k]:v}));

  const payment = parseFloat(f.payment) || 0;
  const interest = Math.round(loan.balance*(loan.rate/100/12)*100)/100;
  const amort = Math.round((payment - interest)*100)/100;
  const newBal = Math.max(0, Math.round((loan.balance - amort)*100)/100);
  const valid = payment>0 && amort>0;

  const handle = () => {
    if(!valid) return;
    onAdd(loan.id, { month:f.month, payment, interest, amortization:amort, balance:newBal });
    onClose();
  };

  return (
    <Modal title={`💳 Betalning – ${loan.name}`} onClose={onClose}>
      <div style={{background:C.surf2,borderRadius:10,padding:'14px 16px',marginBottom:18}}>
        <div style={{fontSize:10,color:C.sub,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:4}}>Nuvarande saldo</div>
        <div style={{fontSize:24,fontWeight:900,color:C.blue}}>{kr(loan.balance)}</div>
        <div style={{fontSize:11,color:C.sub,marginTop:3}}>{loan.rate}% ränta/år · månadsränta ≈ {kr(interest)}</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
        <div style={{marginBottom:14}}>
          <Lbl text="Period (månad)"/>
          <input type="month" value={f.month} onChange={e=>set('month',e.target.value)} style={INP}/>
        </div>
        <Inp label="Total betalning (kr)" type="number" value={f.payment} onChange={v=>set('payment',v)} placeholder="0" autoFocus/>
      </div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <Btn variant="ghost" onClick={onClose}>Avbryt</Btn>
        <Btn onClick={handle} disabled={!valid}>Registrera betalning</Btn>
      </div>
    </Modal>
  );
}

function Lan({ loans, onSave }) {
  const [showAdd,setShowAdd] = useState(false);
  const [payLoan,setPayLoan] = useState(null);
  const [expanded,setExpanded] = useState(null);

  const addLoan = l => onSave([...loans, l]);
  const addPay = (loanId,pay) =>
    onSave(loans.map(l => l.id!==loanId ? l : {...l, balance:pay.balance, payments:[...(l.payments||[]),pay]}));

  const delLoan = id => { if(window.confirm('Ta bort lån och all historik?')) onSave(loans.filter(l=>l.id!==id)); };

  const totalDebt = loans.reduce((s,l)=>s+(l.balance||0),0);
  const totalInt = loans.reduce((s,l)=>s+(l.payments||[]).reduce((s2,p)=>s2+p.interest,0),0);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <h2 style={{margin:0,color:C.text,fontSize:22,fontWeight:900}}>🏦 Lån</h2>
        <Btn onClick={()=>setShowAdd(true)}>+ Lägg till lån</Btn>
      </div>

      {loans.length>0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:22}}>
          {[
            ['Total skuld',kr(totalDebt),C.blue],
            ['Total ränta betald',kr(totalInt),C.red],
            ['Antal lån',loans.length+' st',C.sub]
          ].map(([l,v,color])=>(
            <Card key={l} style={{textAlign:'center',padding:14}}>
              <div style={{fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>{l}</div>
              <div style={{fontSize:17,fontWeight:900,color}}>{v}</div>
            </Card>
          ))}
        </div>
      )}

      {loans.length===0 ? (
        <Card style={{textAlign:'center',padding:64}}>
          <div style={{fontSize:48,marginBottom:14}}>🏦</div>
          <div style={{color:C.sub,marginBottom:20}}>Inga lån registrerade</div>
          <Btn onClick={()=>setShowAdd(true)}>Lägg till ditt första lån</Btn>
        </Card>
      ) : loans.map(l=>{
        const totIntLoan = (l.payments||[]).reduce((s,p)=>s+p.interest,0);
        const totAmort = (l.payments||[]).reduce((s,p)=>s+p.amortization,0);
        const pct = l.origAmount>0 ? Math.round(((l.origAmount-l.balance)/l.origAmount)*100) : 0;
        const isExp = expanded===l.id;

        return (
          <Card key={l.id} style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
              <div>
                <div style={{color:C.text,fontSize:17,fontWeight:800}}>{l.name}</div>
                <div style={{color:C.sub,fontSize:11,marginTop:2}}>Startade {l.startDate} · {l.rate}%/år nominell ränta</div>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <Btn variant="blue" sm onClick={()=>setPayLoan(l)}>+ Betalning</Btn>
                <Btn variant="ghost" sm onClick={()=>setExpanded(isExp?null:l.id)}>{isExp?'▲':'▼'} Historik</Btn>
                <Btn variant="danger" sm onClick={()=>delLoan(l.id)}>🗑️</Btn>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
              {[
                ['Ursprungslån',kr(l.origAmount),C.sub],
                ['Kvar att betala',kr(l.balance),C.blue],
                ['Total ränta',kr(totIntLoan),C.red],
                ['Total amortering',kr(totAmort),C.green]
              ].map(([label,value,color])=>(
                <div key={label} style={{background:C.surf2,borderRadius:10,padding:'10px 14px'}}>
                  <div style={{fontSize:10,color:C.sub,marginBottom:3,textTransform:'uppercase',letterSpacing:'0.06em'}}>{label}</div>
                  <div style={{fontSize:15,fontWeight:900,color}}>{value}</div>

              ))}
            </div>

            <div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.sub,marginBottom:5}}>
                <span>Amorteringsgrad</span>
                <span>{pct}% amorterat · {kr(l.balance)} kvar</span>
              </div>
              <div style={{background:C.surf2,borderRadius:4,height:6,overflow:'hidden'}}>
                <div style={{
                  width:`${l.origAmount>0?Math.min(100,((l.origAmount-l.balance)/l.origAmount)*100):0}%`,
                  height:'100%',background:C.blue,borderRadius:4
                }}/>
              </div>
            </div>

            {isExp && (
              <div style={{marginTop:20}}>
                <div style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>
                  Betalningshistorik
                </div>
                {(l.payments||[]).length===0 ? (
                  <div style={{color:C.sub,fontSize:13}}>Inga betalningar registrerade ännu.</div>
                ) : (
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:500}}>
                      <thead>
                        <tr style={{borderBottom:`1px solid ${C.border}`}}>
                          {['Period','Total betalning','Räntekostnad','Amortering','Saldo efter'].map((h,i)=>(
                            <th key={h} style={{padding:'6px 10px',textAlign:i===0?'left':'right',color:C.sub,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>
                              {h}
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[...(l.payments||[])].reverse().map((p,i)=>(
                          <tr key={i} style={{borderBottom:`1px solid ${C.faint}`}}>
                            <td style={{padding:'6px 10px',color:C.text}}>{moLbl(p.month)}</td>
                            <td style={{padding:'6px 10px',textAlign:'right',color:C.text}}>{kr(p.payment)}</td>
                            <td style={{padding:'6px 10px',textAlign:'right',color:C.red}}>{kr(p.interest)}</td>
                            <td style={{padding:'6px 10px',textAlign:'right',color:C.green}}>{kr(p.amortization)}</td>
                            <td style={{padding:'6px 10px',textAlign:'right',color:C.blue,fontWeight:700}}>{kr(p.balance)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
          </Card>
        );
      })}

      {showAdd && <AddLoanModal onAdd={addLoan} onClose={()=>setShowAdd(false)}/>}
      {payLoan && <PayModal loan={payLoan} onAdd={addPay} onClose={()=>setPayLoan(null)}/>}
    </div>
  );
}

/* ── SPARANDE ── */
const GOAL_ICONS = ['🏖️','🚐','🏡','🎓','💍','💻','🛳️','✈️','🎯','🌅','🏦','💰','🏋️','🎸','📷','🌿'];

function AddGoalModal({ onAdd, onClose }) {
  const [f,setF] = useState({ name:'', icon:'🎯', target:'', current:'', category:'goal_s', deadline:'' });
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const handle=()=>{
    const t=parseFloat(f.target);
    if(!f.name || isNaN(t) || t<=0) return;
    onAdd({ id:uid(), name:f.name, icon:f.icon, target:t, current:parseFloat(f.current)||0, category:f.category, deadline:f.deadline });
    onClose();
  };

  return (
    <Modal title="🎯 Nytt sparmål" onClose={onClose}>
      <div style={{marginBottom:14}}>
        <Lbl text="Ikon"/>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {GOAL_ICONS.map(ic=>(
            <button key={ic} onClick={()=>set('icon',ic)}
              style={{
                width:40,height:40,borderRadius:10,fontSize:19,cursor:'pointer',
                background:f.icon===ic?C.accentFade:C.surf2,
                border:`1px solid ${f.icon===ic?C.accent:C.border}`,
                color:C.text
              }}>
              {ic}
            </button>
          ))}
        </div>
      </div>

      <Inp label="Namn på sparmålet" value={f.name} onChange={v=>set('name',v)} placeholder="t.ex. Buffert, Semester..." autoFocus/>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
        <Inp label="Målbelopp (kr)" type="number" value={f.target} onChange={v=>set('target',v)} placeholder="0"/>
        <Inp label="Sparat hittills (kr)" type="number" value={f.current} onChange={v=>set('current',v)} placeholder="0"/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
        <Sel label="Typ av sparande" value={f.category} onChange={v=>set('category',v)} options={[
          {v:'buffer_s',l:'🏦 Buffertsparande'},
          {v:'goal_s',l:'🎯 Målsparande'},
          {v:'pension_s',l:'🌅 Pensionssparande'}
        ]}/>
        <Inp label="Önskat datum (valfri)" type="date" value={f.deadline} onChange={v=>set('deadline',v)}/>
      </div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <Btn variant="ghost" onClick={onClose}>Avbryt</Btn>
        <Btn onClick={handle} disabled={!f.name || !f.target}>Skapa sparmål</Btn>
      </div>
    </Modal>
  );
}

function Sparande({ goals, onSave }) {
  const [showAdd,setShowAdd] = useState(false);
  const [deposit,setDeposit] = useState(null);
  const [depAmt,setDepAmt] = useState('');

  const addGoal=g=>onSave([...goals,g]);
  const delGoal=id=>{ if(window.confirm('Ta bort sparmål?')) onSave(goals.filter(g=>g.id!==id)); };

  const doDeposit=()=>{
    const a=parseFloat(depAmt);
    if(!a || !deposit) return;
    onSave(goals.map(g=>g.id===deposit.id?{...g,current:Math.min(g.target,g.current+a)}:g));
    setDeposit(null); setDepAmt('');
  };

  const totalSaved=goals.reduce((s,g)=>s+g.current,0);
  const totalTarget=goals.reduce((s,g)=>s+g.target,0);

  const SECS=[
    {id:'buffer_s',label:'🏦 Buffertsparande',color:C.blue},
    {id:'goal_s',label:'🎯 Målsparande',color:C.accent},
    {id:'pension_s',label:'🌅 Pensionssparande',color:C.purple},
  ];

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <h2 style={{margin:0,color:C.text,fontSize:22,fontWeight:900}}>🎯 Sparande</h2>
        <Btn onClick={()=>setShowAdd(true)}>+ Nytt sparmål</Btn>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
        {[
          ['Totalt sparat',totalSaved,C.purple],
          ['Totalt mål',totalTarget,C.sub],
          ['Kvar till mål',totalTarget-totalSaved,C.accent]
        ].map(([l,v,color])=>(
          <Card key={l} style={{textAlign:'center',padding:14}}>
            <div style={{fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>{l}</div>
            <div style={{fontSize:17,fontWeight:900,color}}>{kr(v)}</div>
          </Card>
        ))}
      </div>

      {goals.length===0 && (
        <Card style={{textAlign:'center',padding:64}}>
          <div style={{fontSize:48,marginBottom:14}}>🎯</div>
          <div style={{color:C.sub,marginBottom:20}}>Inga sparmål skapade ännu</div>
          <Btn onClick={()=>setShowAdd(true)}>Skapa ditt första sparmål</Btn>
        </Card>
      )}

      {SECS.map(sec=>{
        const sg=goals.filter(g=>g.category===sec.id);
        if(!sg.length) return null;

        return (
          <div key={sec.id} style={{marginBottom:24}}>
            <div style={{fontSize:13,fontWeight:800,color:C.sub,marginBottom:14}}>{sec.label}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:14}}>
              {sg.map(g=>{
                const pct=g.target>0?Math.min(100,(g.current/g.target)*100):0;
                const done=pct>=100;
                let daysLeft=null;
                if(g.deadline){ const d=new Date(g.deadline+'T12:00'); daysLeft=Math.round((d-new Date())/86400000); }

                return (
                  <Card key={g.id} style={{position:'relative'}}>
                    {done && (
                      <div style={{
                        position:'absolute',top:14,right:14,
                        background:C.greenFade,color:C.green,
                        border:`1px solid ${C.green}44`,
                        borderRadius:20,fontSize:10,fontWeight:700,padding:'2px 8px'
                      }}>
                        ✓ UPPNÅTT
                      </div>
                    )}

                    <div style={{fontSize:36,marginBottom:10}}>{g.icon}</div>
                    <div style={{color:C.text,fontSize:15,fontWeight:800,marginBottom:3}}>{g.name}</div>

                    {g.deadline && (
                      <div style={{fontSize:11,color:daysLeft!==null && daysLeft<30 ? C.red : C.sub,marginBottom:10}}>
                        📅 {datS(g.deadline)}{daysLeft!==null ? ` · ${daysLeft>0?daysLeft+' dagar kvar':daysLeft===0?'Idag!':'Förbi deadline!'}` : ''}
                      </div>
                    )}

                    <div style={{background:C.surf2,borderRadius:4,height:6,overflow:'hidden',marginBottom:8}}>
                      <div style={{width:`${pct}%`,height:'100%',background:sec.color,borderRadius:4}}/>
                    </div>

                    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:10}}>
                      <span style={{color:sec.color,fontWeight:700}}>{kr(g.current)}</span>
                      <span style={{color:C.sub}}>av {kr(g.target)}</span>
                      <span style={{color:C.sub}}>{Math.round(pct)}%</span>
                    </div>

                    {!done && <div style={{fontSize:11,color:C.sub,marginBottom:12}}>Kvar: {kr(g.target-g.current)}</div>}

                    <div style={{display:'flex',gap:8}}>
                      {!done && <Btn variant="green" sm onClick={()=>{setDeposit(g);setDepAmt('');}}>+ Sätt in</Btn>}
                      <Btn variant="danger" sm onClick={()=>delGoal(g.id)}>🗑️</Btn>
                    </div>
                  </Card>
                );
              })}
            </div>
          </div>
        );
      })}

      {showAdd && <AddGoalModal onAdd={addGoal} onClose={()=>setShowAdd(false)}/>}

      {deposit && (
        <Modal title={`💰 Sätt in – ${deposit.name}`} onClose={()=>setDeposit(null)}>
          <div style={{background:C.surf2,borderRadius:10,padding:'14px 16px',marginBottom:16}}>
            <div style={{fontSize:10,color:C.sub,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:4}}>Nuvarande saldo</div>
            <div style={{fontSize:22,fontWeight:900,color:C.purple}}>{kr(deposit.current)}</div>
            <div style={{background:C.surf,borderRadius:4,height:6,overflow:'hidden',marginTop:8}}>
              <div style={{
                width:`${deposit.target>0?Math.min(100,(deposit.current/deposit.target)*100):0}%`,
                height:'100%',background:C.purple,borderRadius:4
              }}/>
            </div>
            <div style={{fontSize:11,color:C.sub,marginTop:4}}>Mål: {kr(deposit.target)}</div>
          </div>

          <Inp label="Belopp att sätta in (kr)" type="number" value={depAmt} onChange={setDepAmt} placeholder="0" autoFocus/>

          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <Btn variant="ghost" onClick={()=>setDeposit(null)}>Avbryt</Btn>
            <Btn onClick={doDeposit} disabled={!depAmt || parseFloat(depAmt)<=0}>Lägg till sparande</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}
/* ── EXPORT / IMPORT BACKUP ── */
function exportBackup() {
  const data = {
    txns: db.get('txns') || [],
    loans: db.get('loans') || [],
    goals: db.get('goals') || [],
    budgets: db.get('budgets') || {}
  };

  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: 'application/json' }
  );

  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = URL.createObjectURL(blob);
  a.download = `MinEkonomi-backup-${date}.json`;
  a.click();

  URL.revokeObjectURL(a.href);
}

function importBackup(file) {
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);

      if (!data.txns || !data.loans || !data.goals || !data.budgets) {
        alert('Ogiltig backup-fil');
        return;
      }

      db.set('txns', data.txns);
      db.set('loans', data.loans);
      db.set('goals', data.goals);
      db.set('budgets', data.budgets);

      alert('Backup importerad! Sidan laddas om.');
      location.reload();
    } catch {
      alert('Kunde inte läsa backup-filen');
    }
  };

  reader.readAsText(file);
}
/* ── HUVUD-APP ── */
function App(){
  const [auth,setAuth] = useState(false);
  const [page,setPage] = useState('dash');

  const [txns,setTxns] = useState(() => db.get('txns') || []);
  const [loans,setLoans] = useState(() => db.get('loans') || []);
  const [goals,setGoals] = useState(() => db.get('goals') || []);
  const [budgets,setBudgets] = useState(() => db.get('budgets') || {});

  // ✅ Changelog + last updated
  const [showChangelog, setShowChangelog] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(() => db.get('lastUpdated'));

  const touchUpdated = () => {
    const ts = new Date().toISOString();
    db.set('lastUpdated', ts);
    setLastUpdated(ts);
  };

  // ✅ Save helpers
  const saveTxns = n => { setTxns(n); db.set('txns', n); touchUpdated(); };
  const saveLoans = n => { setLoans(n); db.set('loans', n); touchUpdated(); };
  const saveGoals = n => { setGoals(n); db.set('goals', n); touchUpdated(); };
  const saveBudgets = n => { setBudgets(n); db.set('budgets', n); touchUpdated(); };

  if(!auth) return <LoginScreen onUnlock={() => setAuth(true)} />;

  return (
    <div style={{display:'flex',height:'100vh',background:C.bg,overflow:'hidden'}}>
      <Sidebar page={page} onNav={setPage} onLogout={() => setAuth(false)} />

      <main style={{flex:1,overflowY:'auto',padding:'32px 36px'}}>
        {/* Export/Import-raden */}
        <div style={{display:'flex',gap:10,marginBottom:20,alignItems:'center'}}>
          <Btn variant="ghost" onClick={exportBackup}>💾 Exportera backup</Btn>

          <label style={{cursor:'pointer'}}>
            <input
              type="file"
              accept=".json"
              style={{display:'none'}}
              onChange={e => importBackup(e.target.files[0])}
            />
            <Btn variant="ghost">📂 Importera backup</Btn>
          </label>
        </div>

        {page==='dash' && (
          <Dashboard
            txns={txns}
            loans={loans}
            goals={goals}
            lastUpdated={lastUpdated}
            onOpenChangelog={() => setShowChangelog(true)}
          />
        )}
        {page==='kassabok' && <Kassabok txns={txns} onSave={saveTxns} />}
        {page==='budget' && <Budget txns={txns} budgets={budgets} onSaveBudgets={saveBudgets} />}
        {page==='lan' && <Lan loans={loans} onSave={saveLoans} />}
        {page==='sparande' && <Sparande goals={goals} onSave={saveGoals} />}
      </main>

      {showChangelog && <ChangelogModal onClose={() => setShowChangelog(false)} />}
    </div>
  );
}

/* ── STARTA REACT ── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
