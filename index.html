<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Mina Appar</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --stone:#F7F5F0;
      --stone2:#EDE9E1;
      --stone3:#D9D3C7;
      --ink:#1A1714;
      --ink2:#4A4540;
      --ink3:#8C857C;
      --gold:#B8860B;
      --gold2:#E8C547;
      --r:16px;
    }

    html{scroll-behavior:smooth}
    body{
      background:var(--stone);
      color:var(--ink);
      font-family:'DM Sans',system-ui,sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;inset:0;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%,rgba(184,134,11,0.08) 0%,transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%,rgba(184,134,11,0.06) 0%,transparent 60%);
      pointer-events:none;z-index:0;
    }

    header{
      position:relative;z-index:1;
      padding:64px 32px 48px;
      max-width:900px;margin:0 auto;
    }

    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:40px}
    .logo-mark{
      width:36px;height:36px;
      background:var(--ink);
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
    }
    .logo-mark svg{width:20px;height:20px;fill:var(--gold2)}
    .logo-name{
      font-size:13px;font-weight:600;
      letter-spacing:2px;text-transform:uppercase;
      color:var(--ink3);
    }

    .hero-title{
      font-family:'DM Serif Display',serif;
      font-size:clamp(2.4rem,6vw,4rem);
      line-height:1.1;
      margin-bottom:18px;
    }
    .hero-title em{color:var(--gold)}

    .hero-sub{
      font-size:1.05rem;
      color:var(--ink3);
      max-width:520px;
      line-height:1.6;
    }

    .divider{width:48px;height:2px;background:var(--gold);margin:28px 0}

    /* INFO ICON */
    .info-icon{
      position:relative;
      display:inline-flex;
      margin-left:6px;
      cursor:help;
    }
    .tooltip{
      position:absolute;
      bottom:140%;left:50%;
      transform:translateX(-50%);
      width:220px;
      background:#2C2C2A;color:#fff;
      padding:8px 10px;
      border-radius:8px;
      font-size:12px;line-height:1.5;
      opacity:0;pointer-events:none;
      transition:opacity .2s,transform .2s;
      z-index:10;
    }
    .tooltip::after{
      content:'';
      position:absolute;top:100%;left:50%;
      transform:translateX(-50%);
      border-width:6px;border-style:solid;
      border-color:#2C2C2A transparent transparent transparent;
    }
    .info-icon:hover .tooltip,
    .info-icon:focus .tooltip{
      opacity:1;
      transform:translateX(-50%) translateY(-4px);
    }

    .grid{
      position:relative;z-index:1;
      max-width:900px;margin:0 auto;
      padding:0 32px 80px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
      gap:20px;
    }

    .card{
      background:#fff;
      border:1px solid var(--stone3);
      border-radius:var(--r);
      padding:28px;
      display:flex;flex-direction:column;
    }
    .card-top{display:flex;gap:16px;margin-bottom:16px}
    .card-icon{
      width:52px;height:52px;border-radius:12px;
      background:var(--icon-bg,#F5F0E8);
      display:flex;align-items:center;justify-content:center;
      font-size:26px;
    }
    .card-label{
      font-size:11px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:var(--card-accent,var(--gold));
    }
    .card-name{
      font-family:'DM Serif Display',serif;
      font-size:1.35rem;
    }
    .card-desc{
      font-size:.875rem;color:var(--ink3);
      line-height:1.6;margin-bottom:18px;
    }
    .card-tags{display:flex;gap:6px;flex-wrap:wrap}
    .tag{
      font-size:11px;padding:4px 10px;
      border-radius:20px;
      background:var(--stone);
      border:1px solid var(--stone3);
    }
    .card-btns{display:flex;gap:10px;margin-top:auto}
    .btn-app{
      flex:1;padding:11px 18px;border-radius:10px;
      font-size:13px;font-weight:600;
      text-decoration:none;text-align:center;
    }
    .btn-primary{background:var(--ink);color:#fff}
    .btn-secondary{background:var(--stone);border:1px solid var(--stone3);color:var(--ink2)}

    footer{
      text-align:center;
      padding:32px;
      font-size:12px;
      color:var(--ink3);
    }
  </style>
</head>

<body>

<header>
  <div class="logo-row">
    <div class="logo-mark">
